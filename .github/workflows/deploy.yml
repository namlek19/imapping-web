name: Deploy iMapping Web to Server

on:
  push:
    branches:
      - master # Sửa chỗ 1: Chạy khi có code đẩy lên nhánh master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kéo code về Github Actions
        uses: actions/checkout@v3

      - name: Chui vào Server và Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Bắt đầu triển khai Frontend..."
            cd /root/imapping-web || git clone https://github.com/namlek19/imapping-web.git /root/imapping-web
            cd /root/imapping-web
            git pull origin master # Sửa chỗ 2: Kéo code từ nhánh master
            docker compose up -d --build
            echo "Dọn dẹp image rác..."
            docker image prune -f
            echo "Triển khai thành công!"